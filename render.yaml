services:
  - type: web
    name: gicsy-hub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disks:
      - name: data
        mountPath: /app/data
        sizeGB: 1
